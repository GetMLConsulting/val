<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#060606;font-family:-apple-system,'Inter',sans-serif;color:#F1F5F9}
#app{height:100vh;display:flex;flex-direction:column;padding:16px 28px;overflow:hidden}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0}
.title{font-size:24px;font-weight:800;letter-spacing:-1px}
.subtitle{font-size:10px;color:#666;letter-spacing:2.5px;text-transform:uppercase;margin-top:5px;font-weight:600;display:flex;align-items:center;gap:4px}
.client-name{cursor:text;border-bottom:1px solid transparent;transition:border-color 0.15s;color:#666}
.client-name:hover{border-bottom-color:#333}
.tabs{display:flex;border-bottom:1px solid #141414;margin-bottom:12px;gap:2px;flex-shrink:0}
.tab{background:none;border:none;cursor:pointer;font-size:11px;font-weight:700;color:#888;padding:7px 16px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;text-transform:uppercase;letter-spacing:1.5px}
.tab.active{color:#F1F5F9;border-bottom-color:#F1F5F9}
.content{display:flex;flex-direction:column;flex:1;min-height:0}
.row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0}
.card{background:#0d0d0d;border-radius:12px;padding:14px 16px;flex:1;min-width:120px;position:relative;overflow:hidden;transition:all 0.2s;border:1px solid #141414}
.card:hover{border-color:#1e1e1e;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.6)}
.card:hover .ca{opacity:1}
.ca{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#F97316,#FBBF24);opacity:0;transition:opacity 0.2s}
.card-label{font-size:9px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.card-value{font-size:22px;font-weight:800;color:#F1F5F9;letter-spacing:-0.5px;margin-bottom:6px;line-height:1}
.card-sub{font-size:10px;color:#666}
.goal{background:#0d0d0d;border-radius:12px;padding:14px 20px;border:1px solid #141414;margin-bottom:10px;position:relative;overflow:hidden;flex-shrink:0}
.goal-accent{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#F97316,#FBBF24,#22D3A5);opacity:0.6}
.goal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.goal-label{font-size:9px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;display:flex;align-items:center;gap:8px}
.goal-amount{font-size:28px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.goal-of{font-size:13px;color:#666;margin-left:8px}
.goal-pct{font-size:24px;font-weight:800;background:linear-gradient(135deg,#F97316,#FBBF24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.goal-bar-bg{background:#111;border-radius:99px;height:4px;overflow:hidden;margin-bottom:8px}
.goal-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,#F97316,#FBBF24);box-shadow:0 0 6px rgba(249,115,22,0.4);transition:width 0.6s}
.goal-footer{display:flex;justify-content:space-between;font-size:11px;color:#666}
.edit-btn{background:none;border:1px solid #1e1e1e;color:#666;border-radius:5px;padding:1px 7px;font-size:9px;cursor:pointer;font-weight:600;text-transform:uppercase;letter-spacing:0.8px}
.sl{display:flex;align-items:center;gap:8px;margin-bottom:8px;margin-top:4px;flex-shrink:0}
.sl span{font-size:9px;color:#555;font-weight:700;text-transform:uppercase;letter-spacing:2px;white-space:nowrap}
.sl hr{flex:1;border:none;border-top:1px solid #141414}
.chart-wrap{background:#0d0d0d;border-radius:12px;padding:14px 16px;border:1px solid #141414;flex:1;display:flex;flex-direction:column;min-height:0}
